<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>EarnPro – Register</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
body{padding:0;min-height:100svh;display:flex;flex-direction:column;justify-content:center}
.blocked-wrap{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;z-index:9999}
.blocked-box{background:var(--card);border:1px solid rgba(239,68,68,.35);border-radius:var(--r4);padding:28px 22px;max-width:360px;width:100%}
.blocked-title{font-size:22px;font-weight:900;color:var(--red);margin-bottom:10px}
.blocked-msg{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:14px}
.blocked-rule{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--r2);padding:10px 14px;font-size:12px;color:var(--red);font-weight:600;margin-bottom:18px}
</style>
</head>
<body>

<!-- BLOCKED SCREEN -->
<div class="blocked-wrap" id="blockedScreen">
  <div style="font-size:72px;margin-bottom:16px">🚫</div>
  <div class="blocked-box">
    <div class="blocked-title">Already Registered</div>
    <div class="blocked-msg">An account already exists on this device.<br><br><strong style="color:var(--t1)">Only one account per device is allowed.</strong></div>
    <div class="blocked-rule">⚠️ Multiple accounts are not permitted</div>
    <a href="login.html" class="btn btn-p btn-full" style="margin-bottom:10px">🔑 Login to My Account</a>
  </div>
</div>

<!-- REGISTER FORM -->
<div class="auth-pg fade-in" style="width:100%" id="registerForm">
  <div class="auth-logo">
    <div class="al">💎</div>
    <h1>EarnPro</h1>
    <p>Start earning from day one</p>
  </div>
  <div class="auth-card">
    <h2>Create Account ✨</h2>
    <p class="sub">Join thousands of active earners</p>
    <div class="igroup ifield-ico">
      <label>Username</label>
      <span class="ico">👤</span>
      <input type="text" id="un" class="ifield" placeholder="cooluser123" autocomplete="username">
    </div>
    <div class="igroup ifield-ico">
      <label>Email Address</label>
      <span class="ico">✉️</span>
      <input type="email" id="em" class="ifield" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="igroup">
      <label>Password</label>
      <input type="password" id="pw" class="ifield" placeholder="Minimum 6 characters" autocomplete="new-password">
    </div>
    <div class="igroup ifield-ico">
      <label>Referral Code <span style="color:var(--t3);text-transform:none;font-weight:400">(optional)</span></label>
      <span class="ico">🔗</span>
      <input type="text" id="ref" class="ifield" placeholder="EPXXXXXX" style="text-transform:uppercase">
    </div>
    <button class="btn btn-p btn-full btn-lg" id="regBtn">✨ Create Account</button>
    <div class="divider"></div>
    <p class="auth-foot" style="margin:0">Already have account? <a href="login.html">Login</a></p>
  </div>
</div>

<script type="module">
import { auth, db } from './assets/firebase/firebase.js';
import { createUserWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { doc, setDoc, collection, query, where, getDocs, updateDoc, increment, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { toast, showLoader, hideLoader, refCode } from './assets/js/app.js';

onAuthStateChanged(auth, u => { if (u) location.href = 'home.html'; });

// Referral from URL
const urlRef = new URLSearchParams(location.search).get('ref');
if (urlRef) document.getElementById('ref').value = urlRef.toUpperCase();
document.getElementById('ref').addEventListener('input', function(){ this.value = this.value.toUpperCase(); });

// Simple device lock using localStorage only
const DEV_KEY = 'ep_dev_registered';
if (localStorage.getItem(DEV_KEY) === 'yes') {
  document.getElementById('registerForm').style.display = 'none';
  document.getElementById('blockedScreen').style.display = 'flex';
}

// REGISTER
document.getElementById('regBtn').addEventListener('click', async () => {
  const un = document.getElementById('un').value.trim();
  const em = document.getElementById('em').value.trim();
  const pw = document.getElementById('pw').value;
  const rf = document.getElementById('ref').value.trim().toUpperCase();

  if (!un || !em || !pw) { toast('Please fill all required fields', 'err'); return; }
  if (un.length < 3) { toast('Username min 3 characters', 'err'); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(un)) { toast('Username: letters, numbers, underscore only', 'err'); return; }
  if (pw.length < 6) { toast('Password min 6 characters', 'err'); return; }

  // Check localStorage block first
  if (localStorage.getItem(DEV_KEY) === 'yes') {
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('blockedScreen').style.display = 'flex';
    return;
  }

  showLoader('Creating account...');

  try {
    // Referral check
    let referrerId = null;
    if (rf) {
      const q = query(collection(db, 'users'), where('referralCode', '==', rf));
      const snap = await getDocs(q);
      if (snap.empty) {
        hideLoader();
        toast('Invalid referral code', 'err');
        return;
      }
      referrerId = snap.docs[0].id;
    }

    // Create Firebase Auth account
    const cred = await createUserWithEmailAndPassword(auth, em, pw);
    const uid = cred.user.uid;
    const code = refCode(uid);

    // Save user to Firestore
    await setDoc(doc(db, 'users', uid), {
      uid, username: un, email: em,
      balance: 0, totalEarned: 0,
      adsWatched: 0, referralCount: 0,
      referralCode: code,
      referredBy: referrerId || null,
      membership: 'free', role: 'user',
      isActive: true, isBanned: false,
      claimedTasks: [],
      dailyBonusClaimed: null,
      createdAt: serverTimestamp(),
      lastSeen: serverTimestamp()
    });

    // Lock this device via localStorage
    localStorage.setItem(DEV_KEY, 'yes');
    localStorage.setItem('ep_uid', uid);

    // Referral bonus
    if (referrerId) {
      try {
        const setSnap = await getDocs(collection(db, 'settings'));
        const bonus = setSnap.empty ? 5 : (setSnap.docs[0].data().referralBonus || 5);
        await updateDoc(doc(db, 'users', referrerId), {
          balance: increment(bonus),
          totalEarned: increment(bonus),
          referralCount: increment(1)
        });
        await setDoc(doc(db, 'referrals', uid), {
          referrerId, newUserId: uid, bonus,
          newUsername: un, createdAt: serverTimestamp()
        });
      } catch(refErr) {
        // Referral bonus failed silently — account still created
        console.warn('Referral bonus error:', refErr);
      }
    }

    toast('Account created! Welcome 🎉', 'ok');
    setTimeout(() => location.href = 'home.html', 500);

  } catch(e) {
    hideLoader();
    console.error('Registration error:', e.code, e.message);
    const msgs = {
      'auth/email-already-in-use': 'This email is already registered. Please login.',
      'auth/invalid-email': 'Invalid email address',
      'auth/weak-password': 'Password too weak — use 6+ characters',
      'auth/network-request-failed': 'No internet connection. Check your network.',
      'auth/too-many-requests': 'Too many attempts. Please wait a moment.'
    };
    toast(msgs[e.code] || 'Registration failed: ' + (e.message || 'Try again'), 'err');
  }
});
</script>
</body>
</html>
