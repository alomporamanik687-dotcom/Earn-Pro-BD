<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>EarnPro – Login</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>body{padding:0;min-height:100svh;display:flex;flex-direction:column;justify-content:center}</style>
</head>
<body>
<div class="auth-pg fade-in" style="width:100%">
  <div class="auth-logo">
    <div class="al">💎</div>
    <h1>EarnPro</h1>
    <p>Your premium earning platform</p>
  </div>
  <div class="auth-card">
    <h2>Welcome Back 👋</h2>
    <p class="sub">Sign in to continue earning</p>
    <div class="igroup ifield-ico">
      <label>Email Address</label>
      <span class="ico">✉️</span>
      <input type="email" id="em" class="ifield" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="igroup" style="position:relative">
      <label>Password</label>
      <div style="position:relative">
        <input type="password" id="pw" class="ifield" placeholder="••••••••" style="padding-right:44px" autocomplete="current-password">
        <button id="eyeBtn" type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:0">👁️</button>
      </div>
    </div>
    <div style="text-align:right;margin-bottom:16px;margin-top:-6px">
      <a href="#" class="lnk" id="forgotBtn">Forgot password?</a>
    </div>
    <button class="btn btn-p btn-full btn-lg" id="loginBtn">🚀 Login to EarnPro</button>
    <div class="divider"></div>
    <p class="auth-foot" style="margin:0">No account? <a href="register.html">Create one free</a></p>
  </div>
</div>

<script type="module">
import { auth, db } from './assets/firebase/firebase.js';
import { signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { toast, showLoader, hideLoader } from './assets/js/app.js';

// If already authenticated, check ban status and redirect
onAuthStateChanged(auth, async u => {
  if (!u) return;
  try {
    const snap = await getDoc(doc(db, 'users', u.uid));
    if (snap.exists() && snap.data()?.isBanned) {
      const { signOut } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
      await signOut(auth);
      toast('Your account has been banned. Contact support.', 'err');
      return;
    }
  } catch (e) {
    // If we can't read the user doc, still allow login (non-fatal)
    console.warn('EarnPro: ban check failed:', e);
  }
  location.href = 'home.html';
});

document.getElementById('eyeBtn').addEventListener('click', function() {
  const p = document.getElementById('pw');
  p.type = p.type === 'password' ? 'text' : 'password';
  this.textContent = p.type === 'password' ? '👁️' : '🙈';
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  const em = document.getElementById('em').value.trim().toLowerCase();
  const pw = document.getElementById('pw').value;
  if (!em || !pw) { toast('Please fill all fields', 'err'); return; }
  showLoader('Signing in...');
  try {
    const cred = await signInWithEmailAndPassword(auth, em, pw);
    try {
      const snap = await getDoc(doc(db, 'users', cred.user.uid));
      if (snap.exists() && snap.data()?.isBanned) {
        const { signOut } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
        await signOut(auth);
        hideLoader();
        toast('Your account has been banned. Contact support.', 'err');
        return;
      }
    } catch (e) {
      // Non-fatal: can't read user doc but auth succeeded
      console.warn('EarnPro: user doc read failed on login:', e);
    }
    toast('Welcome back! 🎉', 'ok');
    setTimeout(() => location.href = 'home.html', 400);
  } catch (e) {
    hideLoader();
    const m = {
      'auth/user-not-found':       'No account found with this email.',
      'auth/wrong-password':       'Incorrect password. Try again.',
      'auth/invalid-email':        'Invalid email address.',
      'auth/too-many-requests':    'Too many failed attempts. Please wait a few minutes.',
      'auth/invalid-credential':   'Invalid email or password.',
      'auth/network-request-failed':'Network error. Check your connection.'
    };
    toast(m[e.code] || 'Login failed. Please try again.', 'err');
  }
});

document.getElementById('forgotBtn').addEventListener('click', async e => {
  e.preventDefault();
  const em = document.getElementById('em').value.trim();
  if (!em) { toast('Enter your email address first', 'warn'); return; }
  try {
    await sendPasswordResetEmail(auth, em);
    toast('Password reset email sent 📧', 'ok');
  } catch (e) {
    toast(e.code === 'auth/user-not-found' ? 'No account with this email.' : 'Failed to send reset email.', 'err');
  }
});
</script>
</body>
</html>
